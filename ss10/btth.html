<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    let squad = [
    { id: 1, name: "Nguyen Van A", goals: 10, position: "FW" },
    { id: 2, name: "Tran Van B", goals: 5,  position: "MF" },
    { id: 3, name: "Le Van C",   goals: 0,  position: "DF" },
    { id: 4, name: "Pham Van D", goals: 12, position: "FW" },
    { id: 5, name: "Dang Van E", goals: 0,  position: "GK" }
    ];

    let choice ;
    // case1
    function print(squad) {
      squad.forEach(element => {
        console.log(`Mã ${element.id} - ${element.name} (${element.position}): ${element.goals} bàn`);
      });
    }

    // case2
    function create(squad) {
      let name = prompt("Nhập tên mới cần thêm");
      let goals = +prompt(`Nhập bàn thắng của cầu thủ ${name}`);
      let position = prompt("Nhập vị trí của cầu thủ ví dụ FW , MF , DF , GK");

      let newId = 0;
      squad.forEach(element => {
        if (element.id > newId){
          newId = element.id;
        }
      });

      let id = newId + 1;
      let newPlayer = {
        id : id,
        name,
        goals,
        position,
      }

      squad.push(newPlayer);
      alert("Thêm cầu thủ thành công");
    }

    // case3
    function timKiem(squad) {
      let search = +prompt("Nhập ID cầu thủ cần xem");

      let thongTinTimKiem = squad.find((element) => element.id === search);      

      if (thongTinTimKiem === undefined){
        alert("Không tìm thấy thông tin cầu thủ");
      }else{
        console.log(`Mã ${thongTinTimKiem.id} - ${thongTinTimKiem.name} (${thongTinTimKiem.position}): ${thongTinTimKiem.goals} bàn`);
      }
      
    }

    // case4
    function update(squad) {
      let idGoals = +prompt("Nhập ID cầu thủ vừa ghi bàn");

      let thongTinTimKiem = squad.find((element) => element.id === idGoals);
      
      if (!thongTinTimKiem) {
        console.log(`Không tồn tại id cầu thủ`);
      }else{
        thongTinTimKiem.goals = thongTinTimKiem.goals + 1;
        console.log(`Đã cập nhật bàn thắng cho cầu thủ ${thongTinTimKiem.name} thành ${thongTinTimKiem.goals}`);
      }

    }

    // case5
    function xoa(squad) {
      let xoaCauThu = +prompt("Nhập ID cầu thủ cần xóa khỏi đội");

      let newSquad = squad.filter((element) => element.id !== xoaCauThu);

      if (newSquad.length === squad.length) {
        alert("Không tồn tại ID cầu thủ");
      }else{
        alert("Đã xóa thành công");
      }
      return newSquad ;
    }

    do{
      choice = +prompt(`==== QUẢN LÝ ĐỘI BÓNG ====
      1. Xem danh sách
      2. Thêm cầu thủ
      3. Tìm kiếm (theo ID)
      4. Cập nhật bàn thắng
      5. Xóa cầu thủ
      0. Thoát`);

      switch (choice) {
        case 1:
          print(squad);
          break;
        case 2:
          create(squad);
          break;
        case 3:
          timKiem(squad);
          break;
        case 4:
          update(squad);
          break;
        case 5:
          squad = xoa(squad);
          break;
        case 0:
          alert("Thoát");
          break;
      
        default:
          alert("Lựa chọn hợp lệ");
          break;
      }
    }while(choice != 0);
  </script>
</body>
</html>
