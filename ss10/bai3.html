<script>


   const players = [
    { name: "Messi", position: "Forward", age: 36, goals: 25, assists: 15, matches: 34 },
    { name: "Ronaldo", position: "Forward", age: 39, goals: 30, assists: 10, matches: 38 },

    { name: "Alisson", position: "Goalkeeper", age: 31, goals: 0, assists: 1, matches: 37 }

  function getFilteredTotalGoals(minGoals ,players) {
    let loc = players.filter((element) => element.goals >= minGoals);
    console.log(loc);
    
    let tongSoBanThang = loc.reduce((acc , element) => acc + element.goals , 0);
    console.log(`Tổng số bàn thắng : ${tongSoBanThang}`);
    
  }

  getFilteredTotalGoals(20,players);
