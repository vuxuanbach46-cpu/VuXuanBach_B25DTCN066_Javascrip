  <script>
    const players = [
      { name: "Messi", position: "Forward", age: 36, goals: 25, assists: 15, matches: 34, yellowCards: 2 },

      { name: "Van Dijk", position: "Defender", age: 33, goals: 5, assists: 3, matches: 33, yellowCards: 2 },
      { name: "Alisson", position: "Goalkeeper", age: 31, goals: 0, assists: 1, matches: 37, yellowCards: 0 }
    ];

    function generateRankingReport(minMatches , players) {
      let cauThuDuocXepHang = players.filter(element => element.matches >= minMatches);

      let them = players.map(element => {

        let performanceScore = ((element.goals + element.assists) / element.matches).toFixed(2) ;
        let efficiencyScore = (performanceScore - (element.yellowCards / element.matches) * 10).toFixed(2) ;

        console.log(performanceScore);
        console.log(efficiencyScore);
        
        

        element.performance = performanceScore ;
        element.efficiency =  efficiencyScore;

        return `${element.name} , ${element.performance} , ${element.efficiency} , ${element.goals}`
      })
      console.log(them);
      
    }

    generateRankingReport(30,players);
