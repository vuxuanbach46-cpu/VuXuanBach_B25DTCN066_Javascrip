<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Thực hiện chức năng thêm sửa xóa với DOM</h1>
    <h1>Danh Sách Sản Phẩm Chợ Tết</h1>
    <ul id="product-list">
      <!-- Các thẻ li danh sách product -->
    </ul>

    <form id="product-form">
      <input type="text" id="product-name" placeholder="Tên san phẩm" />
      <input type="number" id="product-price" placeholder="Giá (VND)" />
      <button type="submit" onclick="addProduct(event)">Thêm San Pham</button>
    </form>

    <br /><br /><br />

    <form id="product-form-fix">
      <input type="text" id="product-name-fix" placeholder="Nhập tên cần sửa" />
      <input
        type="number"
        id="product-price-fix"
        placeholder="Nhập giá tiền cần sửa"
      />
      <button type="submit" onclick="valueFixProduct(event)">
        Cập nhật thông tin
      </button>
    </form>

    <script>
      let products = [
        { id: 1, name: "Bánh Chưng", price: 150000 },
        { id: 2, name: "Giò Lua", price: 180000 },
        { id: 3, name: "Cnh Đào", price: 500000 },
        { id: 4, name: "Mứt Tết", price: 120000 },
        { id: 5, name: "Bao Li Xi", price: 25000 },
        { id: 6, name: "Dưa Hấu Tết", price: 80000 },
      ];

      // Hiển thị danh sách sản phẩm ra màn hình
      let domProductList = document.getElementById("product-list");
      function renderProduct() {
        products.forEach((element) => {
          let li = document.createElement("li");
          li.innerHTML = `<li>
          <p>Tên sản phẩm ${element.name}</p>
          <p>Giá tiền : ${element.price}</p>
          <button onclick = "fixProduct(${element.id})">Sửa</button>
          <button onclick = "deleteProduct(${element.id})">Xóa</button>
        </li>`;

          domProductList.appendChild(li);
        });
      }
      renderProduct();

      // Thêm sản phẩm mới vào mảng
      function addProduct(event) {
        event.preventDefault();
        domProductList.innerHTML = "";
        let domName = document.getElementById("product-name");
        let valueName = domName.value;
        let domPrice = document.getElementById("product-price");
        let valuePrice = +domPrice.value;

        let newProuct = {
          id: products.length !== 0 ? products[products.length - 1].id + 1 : 1,
          name: valueName,
          price: valuePrice,
        };

        products.push(newProuct);
        renderProduct();

        domName.value = "";
        domPrice.value = "";
      }

      // Xóa phần tử khỏi mảng
      function deleteProduct(id) {
        domProductList.innerHTML = "";
        products = products.filter((element) => element.id !== id);
        renderProduct();
      }

      // Sửa phần tử
      let idDangsua = null ;
      function fixProduct(id) {
        return idDangsua = id ;
      }

      function valueFixProduct(event) {
        event.preventDefault();
        domProductList.innerHTML = "" ;
        let valueNameFix = document.getElementById("product-name-fix").value ;
        let valuePriceFix = document.getElementById("product-price-fix").value ;

        let updateProduct = products.find(element => element.id === idDangsua);
        updateProduct.name = valueNameFix ;
        updateProduct.price = valuePriceFix ;

        renderProduct();
      }
      
    </script>
  </body>
</html>
