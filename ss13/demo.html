<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Danh Sách Sản Phẩm Chợ Tết</h1>
    <ul id="product-list"></ul>
    <form id="product-form">
      <input type="text" id="product-name" placeholder="Tên sản phẩm" />
      <input type="number" id="product-price" placeholder="Giá (VND)" />
      <button onclick="addProduct(event)" type="submit">Thêm Sản Phẩm</button>
    </form>
    <script>
      let products = [
        { id: 1, name: "Bánh Chưng", price: 150000 },
        { id: 2, name: "Giò Lua", price: 180000 },
        { id: 3, name: "Cành Đào", price: 500000 },
        { id: 4, name: "Mứt Tết", price: 120000 },
        { id: 5, name: "Bao Lì Xì", price: 25000 },
        { id: 6, name: "Dưa Hấu Tết", price: 80000 },
      ];

      let product = JSON.parse(localStorage.getItem("product")) || [];
      // localStorage.setItem("product", JSON.stringify(products));
      // localStorage.removeItem("") ;
      // localStorage.clear("");

      // Hiển thị
      function renderProduct() {
        let productList = document.getElementById("product-list");
        productList.innerHTML = "";
        console.log(productList);

        products.forEach((element) => {
          productList.innerHTML += ` <li>
        <div class="product">
          <p>Tên sản phẩm : ${element.name}</p>
          <p>Giá sản phẩm : ${element.price}</p>
          <button onclick="deleteProduct(${element.id})">Xóa</button>
          <button>Sửa</button>
        </div>
      </li>`;
        });
      }
      renderProduct();
      //  Thêm
      function addProduct(event) {
        event.preventDefault();

        let valueName = document.getElementById("product-name");
        let valueNameElement = valueName.value;
        let valuePrice = document.getElementById("product-price");
        let valuePriceElement = +valuePrice.value;

        let newProuct = {
          id: products.length != 0 ? [products.length - 1].id + 1 : 1,
          name: valueNameElement,
          price: valuePriceElement,
        };

        products.push(newProuct);
        localStorage.setItem("product", JSON.stringify(products));
        renderProduct();
      }

      // Xóa
      function deleteProduct(id) {
        console.log("Xóa sản phẩm", id);
        products = products.filter((element) => element.id !== id);
        localStorage.setItem("product", JSON.stringify(products));
        renderProduct();
      }
      
      // sửa
      

      
    </script>
  </body>
</html>
