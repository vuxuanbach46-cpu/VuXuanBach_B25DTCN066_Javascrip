<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Danh Sách Sản Phẩm Trợ Tết</h1>
    <ul id="product-list">
      <!-- Danh sách các sản phẩm -->
    </ul>

    <form id="product-form">
      <input type="text" id="product-name" placeholder="Ten san phẩm" />
      <input type="number" id="product-price" placeholder="Giá (VND)" />
      <button type="submit">Them Sản Phẩm</button>
    </form>

    <script>
      const products = [
        { id: 1, name: "Bánh Chưng", price: 150000 },
        { id: 2, name: "Giò Lua", price: 180000 },
        { id: 3, name: "Cành Đào", price: 500000 },
        { id: 4, name: "Mứt Tết", price: 120000 },
        { id: 5, name: "Bao Li Xi", price: 25000 },
        { id: 6, name: "Dua Hau Tet", price: 80000 },
      ];

      let valueForm = document.getElementById("product-form");
      let valueName = document.getElementById("product-name");
      let valuePrice = document.getElementById("product-price");
      let productList = document.getElementById("product-list");

      valueForm.addEventListener("submit", (e) => {
        e.preventDefault();

        let name = valueName.value;
        let price = valuePrice.value;

        let newProduct = {
          name: name,
          price: price,
        };

        let creatProduct = `
          <div class="product">
            <p>Tên sản phẩm : ${name}</p>
            <p>Giá sản phẩm : ${price}</p>
          </div>`;

        productList.innerHTML += creatProduct;

        valueName.value = "";
        valuePrice.value = "";
      });
    </script>
  </body>
</html>
