<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <style>
      body {
        font-family: Arial;
        background: #f4f4f4;
      }

      .container {
        width: 420px;
        margin: 50px auto;
        background: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      .header {
        background: #d62828;
        color: white;
        text-align: center;
        padding: 20px;
      }

      .header p {
        margin: 5px 0 0 0;
        font-size: 14px;
      }

      ul {
        list-style: none;
        padding: 20px;
        margin: 0;
      }

      li {
        background: #f1ead2;
        padding: 12px;
        margin-bottom: 10px;
        border-left: 5px solid orange;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
      }

      li:hover {
        background: #ece3c0;
      }

      .done {
        background: #d4edda;
        text-decoration: line-through;
        border-left: 5px solid green;
      }

      .footer {
        text-align: center;
        font-size: 12px;
        color: gray;
        padding: 10px;
      }
      .add-todo {
        display: flex;
        padding: 10px 20px;
        gap: 10px;
      }

      .add-todo input {
        flex: 1;
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #ccc;
      }

      .add-todo button {
        padding: 8px 15px;
        background: orange;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      .add-todo button:hover {
        background: #ff9900;
      }
    </style>

    <div class="container">
      <div class="header">
        <h2>Công việc chuẩn bị Tết</h2>
        <p>Click để đánh dấu hoàn thành</p>
      </div>

      <form class="add-todo">
        <input
          id="todo-input"
          type="text"
          placeholder="Nhập công việc mới..."
        />
        <button type="submit" id="add-btn" onclick="addTodo(event)">
          Thêm
        </button>
      </form>

      <ul id="todo-list"></ul>

      <div class="footer">
        Trạng thái được lưu tự động vào localStorage - Refresh để kiểm tra
      </div>
    </div>

    <script>
      let initialTodos = [
        { id: 1, task: "Mua bánh chưng", done: false },
        { id: 2, task: "Dọn nhà đón Tết", done: false },
        { id: 3, task: "Gói bánh chưng", done: false },
        { id: 4, task: "Trang trí nhà cửa bằng hoa mai, hoa đào", done: true },
        { id: 5, task: "Mua phong bao lì xì", done: false },
        { id: 6, task: "Chuẩn bị mâm ngũ quả", done: false },
      ];

      // Đọc dữ liệu từ localStorage
      let todos = JSON.parse(localStorage.getItem("myTodos"));

      if (todos === null) {
        todos = initialTodos;
        localStorage.setItem("myTodos", JSON.stringify(todos));
      }

      // Hiển thị danh sách công việc:
      function renderTodos() {
        let danhSach = document.getElementById("todo-list");
        danhSach.innerHTML = "";
        todos.forEach((element) => {
          let li = document.createElement("li");
          li.innerHTML = `<p>${element.task}</p> <button id="delete" onclick = "deleteTodo(${element.id})" >Xóa</button> `;
          danhSach.appendChild(li);

          if (element.done === true) {
            li.classList.add("done");
          }

          li.onclick = function () {
            element.done = !element.done;
            localStorage.setItem("myTodos", JSON.stringify(todos));
            renderTodos();
          };
        });
      }
      renderTodos();

      // Thêm công việc
      function addTodo(event) {
        event.preventDefault();
        let valueNewTodo = document.getElementById("todo-input").value.trim();
        if (valueNewTodo === "") {
          alert("Không đc để trống");
          return;
        }

        let newTodo = {
          id: initialTodos[initialTodos.length - 1].id + 1,
          task: valueNewTodo,
          done: false,
        };

        initialTodos.push(newTodo);
        localStorage.setItem("myTodos", JSON.stringify(todos));
        console.log(initialTodos);
        renderTodos();
      }

      // Xóa
      function deleteTodo(id) {
        let xacNhan = confirm("Bạn có muốn xóa không");
        if (!xacNhan){
          alert("Hủy thao tác xóa thành công");
          return;
        }
        todos = todos.filter((element) => element.id !== id);
        localStorage.setItem("myTodos", JSON.stringify(todos));
        renderTodos();
      }
    </script>
  </body>
</html>
