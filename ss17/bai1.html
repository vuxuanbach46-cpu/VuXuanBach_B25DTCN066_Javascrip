<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Chuẩn bị Tết</title>
  </head>

  <body>
    <style>
      body {
        font-family: Arial;
        background-color: #f5f5f5;
      }

      .container {
        width: 400px;
        margin: 50px auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
      }

      h1 {
        background: red;
        color: white;
        padding: 15px;
        border-radius: 6px;
      }

      ul {
        list-style: none;
        padding: 0;
      }

      li {
        background: #f0e6d2;
        margin: 10px 0;
        padding: 10px;
        border-left: 5px solid orange;
        border-radius: 5px;
      }
    </style>
    <div class="container">
      <h1>Chuẩn bị Tết Nguyên Đán</h1>
      <p>Danh sách việc cần làm</p>

      <ul id="todo-list">
        <!-- Danh sách công việc -->
      </ul>
    </div>

    <script>
      const todos = [
        { id: 1, task: "Mua bánh chưng", done: false },
        { id: 2, task: "Dọn nhà đón Tết", done: false },
        { id: 3, task: "Gói bánh chưng", done: false },
        { id: 4, task: "Trang trí nhà cửa", done: false },
      ];

      let danhSach = document.getElementById("todo-list");
      todos.forEach((element) => {
        let li = document.createElement("li");
        li.innerHTML = `<p>${element.task}</p>`;
        danhSach.appendChild(li);
      });

      localStorage.setItem("myTodos" , JSON.stringify(todos));
    </script>
  </body>
</html>
