<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const students = [
        {
          id: 1,
          name: "Nguyễn Văn An",
          age: 20,
          gpa: 8.2,
          status: "active",
          createdAt: 1709251200000,
          updatedAt: 1709251200000,
          deletedAt: null,
        },
        {
          id: 2,
          name: "Trần Thị Bình",
          age: 22,
          gpa: 7.5,
          status: "active",
          createdAt: 1709337600000,
          updatedAt: 1709424000000,
          deletedAt: null,
        },
        {
          id: 3,
          name: "Lê Minh Cường",
          age: 19,
          gpa: 6.9,
          status: "inactive",
          createdAt: 1709510400000,
          updatedAt: 1709596800000,
          deletedAt: 1709683200000,
        },
        {
          id: 4,
          name: "Phạm Thu Dung",
          age: 24,
          gpa: 9.1,
          status: "active",
          createdAt: 1709769600000,
          updatedAt: 1709856000000,
          deletedAt: null,
        },
        {
          id: 5,
          name: "Hoàng Gia Huy",
          age: 21,
          gpa: 8.7,
          status: "active",
          createdAt: 1709942400000,
          updatedAt: 1710028800000,
          deletedAt: null,
        },
      ];

      // case 1
      let studentAdd = (students) => {
        let maxId = students[0];
        students.forEach((element) => {
          if (element.id > maxId) {
            maxId = element;
          }
        });

        let id = maxId.id + 1;
        let name = prompt("Nhập tên cần thêm");
        let age = +prompt("Nhập  tuổi");
        let gpa = +prompt("Nhập gpa ");
        let status = prompt("Nhập trạng thái active / inactive");

        let newStudent = {
          id,
          name,
          age,
          gpa,
          status,
          createdAt: Date.now(),
          updatedAt: null,
          deletedAt: null,
        };

        students.push(newStudent);
        console.table(students);
        alert("Đã thêm sinh viên thành công");
      };

      //  case 2
      let studentUpdate = (students) => {
        let searchId = +prompt("Nhập ID sinh viên cần cập nhật");

        let thongTinSinhVien = students.find(
          (element) => element.id === searchId,
        );

        if (thongTinSinhVien === undefined) {
          alert("Không tìm thấy thông tin sinh viên");
          return;
        } else {
          let name = prompt("Nhập tên mới / bỏ trống sẽ giữ nguyên thông tin");
          let age = prompt("Nhập  tuổi mới / bỏ trống sẽ giữ nguyên thông tin");
          let gpa = prompt("Nhập gpa mới / bỏ trống sẽ giữ nguyên thông tin");
          let status = prompt(
            "Nhập trạng thái active / inactive / bỏ trống sẽ giữ nguyên thông tin",
          );

          if (name.trim() !== "") {
            thongTinSinhVien.name = name;
          }
          if (age !== "") {
            thongTinSinhVien.age = +age;
          }
          if (gpa !== "") {
            thongTinSinhVien.gpa = +gpa;
          }
          if (status !== "") {
            thongTinSinhVien.status = status;
          }
          thongTinSinhVien.updatedAt = Date.now();

          console.table(students);
          alert("Cập nhật thông tin sinh viên thành cônng");
        }
      };

      // case 3
      let studentDelete = (students) => {
        let searchId = +prompt("Nhập id cần xóa");

        let thongTinSinhVien = students.find(
          (element) => element.id === searchId,
        );

        if (thongTinSinhVien === undefined) {
          alert("Không tìm thấy thông tin sinh viên");
          return;
        } else {
          thongTinSinhVien.status = "inactive";
          thongTinSinhVien.deletedAt = Date.now();
          alert("Xóa sinh viên thành công");
          console.table(students);
        }
      };


      // case 4 
      let studentRestore = (students) => {
        let searchId = +prompt("Nhập id cần phục hồi");

        let thongTinSinhVien = students.find(
          (element) => element.id === searchId,
        );

        if (thongTinSinhVien === undefined) {
          alert("Không tìm thấy thông tin sinh viên");
          return;
        } else {
          if (thongTinSinhVien.status === "active"){
            alert("Tài khoản đang hoạt động");
            return ;
          }
          thongTinSinhVien.status = "active";
          thongTinSinhVien.updatedAt = Date.now();
          alert("Khôi phục tài khoản sinh viên thành công");
        }
      } 


      let choice;
      do {
        choice = +prompt(`==== STUDENT MANAGER ADVANCED ====
            1.Create Student
            2.Update Student
            3.Soft Delete Student
            4.Restore Student
            5.View Students
            6.Analytics Dashboard
            0.Exit`);
        switch (choice) {
          case 1:
            studentAdd(students);
            break;
          case 2:
            studentUpdate(students);
            break;
          case 3:
            studentDelete(students);
            break;
          case 4:
            studentRestore(students);
            break;
          case 5:
            break;
          case 6:
            break;
          case 0:
            alert("Thoát");
            break;

          default:
            alert("Lựa chọn không hợp lệ");
            break;
        }
      } while (choice !== 0);
    </script>
  </body>
</html>
