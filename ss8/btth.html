<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
  <script>
    const squad = [
      ["Nguyen Van A", 10, "FW"],
      ["Tran Van B", 5, "MF"],
      ["Le Van C", 2, "DF"],
      ["Pham Van D", 12, "FW"],
      ["Hoang Van E", 0, "GK"],
      ["Dang Van F", 7, "MF"]
      ]; 

    let choice ;
    do{
    choice = +prompt(`
      --- QUẢN LÝ ĐỘI BÓNG ---
      1. Xem danh sách
      2. Tìm kiếm (Find)
      3. Lọc vị trí (Filter)
      4. Tổng bàn thắng (Reduce)
      5. Kiểm tra hiệu suất (Some/Every)
      0. Thoát`);

      switch (choice) {
        case 1:
          squad.forEach((element) => {
            console.log(`${element[0]}(${element[2]}) : ${element[1]} `);
          })
          break;
        
        case 2:
          let search = prompt("Nhập tên cầu thủ cần tìm");
          let ketQua = squad.find((element) => element[0] === search);
          if (ketQua){
            console.log(`Thông tin cầu thủ cần tìm là : ${ketQua[0]}(${ketQua[2]}) : ${ketQua[1]}`);
          }
          break;
        case 3:
          
          break;

        case 4:
          
          break;

        case 5:
          
          break;
        
        case 0 :
          alert("Thoát chương trình");
          break;
        default:
          alert("Lựa chọn không hợp lệ");
      }

    }while(choice != 0);
  </script>
</body>
</html>
