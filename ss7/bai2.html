<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
  let playerIds = ["P001", "P002", "P003", "P004", "P005"];
  let playerNames = [
    "Nguyễn Văn A",
    "Trần Thị B",
    "Lê Văn C",
    "Phạm Văn D",
    "Hoàng Thị E"
  ];
  let playerJerseyNumbers = [10, 7, 8, 9, 11];

  function printTeamRoster() {
    console.log("Danh sách đội bóng:");
    for (let i = 0; i < playerIds.length; i++) {
      console.log(
        `${i + 1}. ${playerIds[i]} - ${playerNames[i]} - Số áo: ${playerJerseyNumbers[i]}`
      );
    }
  }

  function updatePlayerNameAndJersey(playerId, newName, newJerseyNumber) {
    let index = playerIds.indexOf(playerId);
    if (index === -1) {
      return false;
    }
    playerNames[index] = newName;
    playerJerseyNumbers[index] = newJerseyNumber;
    return true;
  }

  let playerId = prompt("Nhập mã cầu thủ muốn cập nhật (ví dụ: P001):");

  if (playerId === null || playerId.trim() === "") {
    alert("Mã cầu thủ không được để trống");
  } else {
    playerId = playerId.trim();
    let index = playerIds.indexOf(playerId);

    if (index === -1) {
      alert("Không tìm thấy cầu thủ với mã này!");
    } else {
      let newName;
      while (true) {
        newName = prompt("Nhập tên mới cho cầu thủ:");
        if (newName && newName.trim() !== "") {
          newName = newName.trim();
          break;
        }
        alert("Tên không được để trống");
      }

      let newJersey;
      while (true) {
        let input = prompt("Nhập số áo mới (1–99):");
        newJersey = Number(input);
        if (!isNaN(newJersey) && newJersey >= 1 && newJersey <= 99) {
          break;
        }
        alert("Số áo phải là số nguyên từ 1 đến 99");
      }

      let success = updatePlayerNameAndJersey(playerId, newName, newJersey);

      if (success) {
        console.log("Cập nhật thành công!");
        printTeamRoster();
      }
    }
  }
</script>
</body>
</html>
