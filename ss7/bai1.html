<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    function  printTeamRoster(soLuong) {
      console.log(`Đội bóng hiện tại ( ${soLuong} cầu thủ)`);
      for (let i = 0; i < soLuong; i++) {
        console.log(`${i+1}. ${playerlds[i]} - ${playerPositions[i]}`);
        
      }
    }

    let playerlds = [];
    let playerPositions = [];

    const positions = {
      1: "Thủ môn",
      2: "Hậu vệ",
      3: "Tiền vệ",
      4: "Tiền đạo"
    };

    let soLuong = 0 ;
    while (true) {
      soLuong = +prompt("Có bao nhiêu cầu thủ cần thêm vào hôm nay ? ");
      
      if (soLuong < 0){
        alert("Phải là số nguyên dương");
        continue;
      } 
      break;
    }
    for (let i = 0; i < soLuong ;i++){

      // Nhập ID cầu thù
      while (true){
        let id = prompt(`Nhập mã cầu thủ thứ ${i + 1}`);
        if (playerlds.includes(id)){
          alert ("ID đã tồn tại");
          continue;
        }
        playerlds.push(id);
        break;
      }

    //  Nhập vị trí (chọn số: 1=Thủ môn, 2=Hậu vệ, 3=Tiền vệ, 4=Tiền đạo)
    let position = +prompt(`chọn số: 1=Thủ môn, 2=Hậu vệ, 3=Tiền vệ, 4=Tiền đạo`);

    let positionName = positions[position] || "Không xác định";
    printTeamRoster(soLuong);
      
    }  
  </script>
</body>
</html>
